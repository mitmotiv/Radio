<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player Pro</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
        }
        
        h1 { margin-bottom: 5px; color: #f39c12; font-size: 28px; font-weight: 800; }
        .status-text { color: #aaa; font-size: 14px; margin-bottom: 25px; height: 20px; }
        
        h2 { width: 100%; max-width: 400px; font-size: 14px; color: #aaa; margin: 25px 0 10px 5px; text-transform: uppercase; letter-spacing: 2px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            width: 100%; 
            max-width: 400px; 
        }
        
        .btn { 
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: none; 
            padding: 18px 25px; 
            border-radius: 16px; 
            cursor: pointer;
            color: white; 
            font-weight: bold; 
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active { transform: scale(0.98); }
        
        /* Indikator for når en station spiller */
        .btn.playing { 
            ring: 3px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .play-icon { font-size: 20px; opacity: 0.8; }

        /* Farveprofiler */
        .nova { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .radio100 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .the-voice { background: #ffffff; color: #000; }
        .soft { background: linear-gradient(135deg, #00adef, #005d82); }
        .popfm { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .pop-mix { background: linear-gradient(135deg, #662d91, #441e62); }
        .top-100 { background: linear-gradient(135deg, #fbb03b, #d97e00); }
        .soft-modern { background: linear-gradient(135deg, #7ec9ac, #4d8c75); }
        .soft-classic { background: linear-gradient(135deg, #5b7d87, #354a50); }

        .footer-info { margin-top: 40px; color: #666; font-size: 12px; text-align: center; max-width: 300px; line-height: 1.5; }
    </style>
</head>
<body>

    <h1>Radio Player</h1>
    <p id="status" class="status-text">Klar til afspilning</p>

    <div class="grid">
        <button onclick="toggleRadio('https://live-bauerdk.sharp-stream.com/nova-premium_96.aac', 'Nova', this)" class="btn nova">
            <span>Nova</span> <span class="play-icon">▶️</span>
        </button>

        <button onclick="toggleRadio('https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac', 'Radio 100', this)" class="btn radio100">
            <span>Radio 100</span> <span class="play-icon">▶️</span>
        </button>

        <button onclick="toggleRadio('https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac', 'The Voice', this)" class="btn the-voice">
            <span>The Voice</span> <span class="play-icon">▶️</span>
        </button>

        <button onclick="toggleRadio('https://live-bauerdk.sharp-stream.com/soft-premium_96.aac', 'Soft', this)" class="btn soft">
            <span>Soft</span> <span class="play-icon">▶️</span>
        </button>

        <button onclick="toggleRadio('https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac', 'PopFM', this)" class="btn popfm">
            <span>PopFM</span> <span class="play-icon">▶️</span>
        </button>
    </div>

    <h2>Specials & Mix</h2>
    <div class="grid">
        <button onclick="toggleRadio('https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac', 'Pop Mix', this)" class="btn pop-mix">
            <span>Pop Mix</span> <span class="play-icon">▶️</span>
        </button>
        <button onclick="toggleRadio('https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac', 'Top 100', this)" class="btn top-100">
            <span>Top 100</span> <span class="play-icon">▶️</span>
        </button>
        <button onclick="toggleRadio('https://live-bauerdk.sharp-stream.com/RP09_premium_96.aac', 'Soft Modern', this)" class="btn soft-modern">
            <span>Soft Modern</span> <span class="play-icon">▶️</span>
        </button>
        <button onclick="toggleRadio('https://live-bauerdk.sharp-stream.com/RP08_premium_96.aac', 'Soft Classic', this)" class="btn soft-classic">
            <span>Soft Classic</span> <span class="play-icon">▶️</span>
        </button>
    </div>

    <p class="footer-info">
        Tryk på en station for at starte. Tryk igen for at stoppe.<br>
        Optimerede til <b>Web Video Caster</b>.
    </p>

    <script>
        let currentAudio = new Audio();
        let currentUrl = '';
        const statusElement = document.getElementById('status');

        function toggleRadio(url, name, btn) {
            const icon = btn.querySelector('.play-icon');

            // Hvis vi trykker på den station, der allerede spiller -> STOP
            if (currentUrl === url && !currentAudio.paused) {
                currentAudio.pause();
                resetUI();
                statusElement.textContent = "Pause: " + name;
                return;
            }

            // Hvis en anden station spiller -> STOP den først
            currentAudio.pause();
            resetUI();

            // Start den nye station
            currentAudio.src = url;
            currentAudio.play().catch(e => {
                statusElement.textContent = "Fejl: Browseren blokerede lyden.";
            });
            
            currentUrl = url;
            btn.classList.add('playing');
            icon.textContent = '⏸️';
            statusElement.textContent = "Spiller nu: " + name;
        }

        function resetUI() {
            document.querySelectorAll('.btn').forEach(b => {
                b.classList.remove('playing');
                b.querySelector('.play-icon').textContent = '▶️';
            });
        }
    </script>

</body>
</html>
