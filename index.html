<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player Pro</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background: #121212; color: white; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; margin: 0; padding-bottom: 140px;
        }
        
        h1 { color: #f39c12; font-size: 28px; margin-bottom: 10px; }
        .info { color: #888; font-size: 14px; margin-bottom: 30px; text-align: center; }

        .grid { 
            display: grid; grid-template-columns: 1fr; gap: 12px; 
            width: 100%; max-width: 400px; 
        }
        
        /* Knapperne er nu rigtige knapper (stopper download) */
        .btn { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 25px; border-radius: 16px; border: none;
            color: white; font-weight: bold; font-size: 18px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        
        .btn:active { transform: scale(0.97); }

        .the-voice { background: #ffffff; color: #000; }
        .nova { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .radio100 { background: linear-gradient(135deg, #2980b9, #3498db); }
        .soft { background: #00adef; }
        .popfm { background: #8e44ad; }
        .special { background: #333; }

        /* Afspiller bar */
        .player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #1e1e1e; padding: 20px 0;
            display: flex; flex-direction: column; align-items: center;
            border-top: 1px solid #333; box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        #playing-name { font-weight: bold; color: #f39c12; margin-bottom: 10px; }
        audio { width: 90%; max-width: 400px; }

        /* Skjult liste til Web Video Caster's sniffer */
        #wvc-sniffer { display: none; }
    </style>
</head>
<body>

    <h1 id="main-title">Radio Player</h1>
    <p class="info">Spiller direkte fra original kilde</p>

    <div class="grid">
        <button onclick="playLocal('https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac', 'The Voice')" class="btn the-voice">
            <span>The Voice</span> <span>💬</span>
        </button>

        <button onclick="playLocal('https://live-bauerdk.sharp-stream.com/nova-premium_96.aac', 'Nova')" class="btn nova">
            <span>Nova</span> <span>✨</span>
        </button>

        <button onclick="playLocal('https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac', 'Radio 100')" class="btn radio100">
            <span>Radio 100</span> <span>💯</span>
        </button>

        <button onclick="playLocal('https://live-bauerdk.sharp-stream.com/soft-premium_96.aac', 'Soft')" class="btn soft">
            <span>Soft</span> <span>☁️</span>
        </button>

        <button onclick="playLocal('https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac', 'PopFM')" class="btn popfm">
            <span>PopFM</span> <span>🎤</span>
        </button>
    </div>

    <div class="player-bar">
        <div id="playing-name">Vælg en station</div>
        <audio id="audio-element" controls playsinline crossorigin="anonymous"></audio>
    </div>

    <div id="wvc-sniffer">
        <a href="https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac">The Voice</a>
        <a href="https://live-bauerdk.sharp-stream.com/nova-premium_96.aac">Nova</a>
        <a href="https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac">Radio 100</a>
        <a href="https://live-bauerdk.sharp-stream.com/soft-premium_96.aac">Soft</a>
        <a href="https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac">PopFM</a>
    </div>

    <script>
        const audio = document.getElementById('audio-element');
        const mainTitle = document.getElementById('main-title');
        const playingLabel = document.getElementById('playing-name');

        function playLocal(url, name) {
            // 1. Opdater UI
            mainTitle.textContent = name;
            playingLabel.textContent = "Spiller: " + name;
            document.title = "▶ " + name;

            // 2. Sæt original kilde direkte i afspilleren (Stopper download)
            audio.src = url;
            audio.load();
            audio.play();

            // 3. Metadata til browser/system
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: name,
                    artist: 'Bauer Media',
                    album: 'Live Stream'
                });
            }
        }
    </script>

</body>
</html>
