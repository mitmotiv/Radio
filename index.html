<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            padding-bottom: 140px;
        }
        
        h1 { margin-bottom: 5px; color: #f39c12; font-size: 28px; font-weight: 800; }
        .status-header { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            width: 100%; 
            max-width: 400px; 
        }
        
        .btn { 
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 25px; 
            border-radius: 16px; 
            text-decoration: none; 
            color: white; 
            font-weight: bold; 
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s;
            cursor: pointer;
            border: none;
            width: 100%;
        }
        
        .btn:active { transform: scale(0.97); }

        /* Farver */
        .nova { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .radio100 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .the-voice { background: #ffffff; color: #000; }
        .soft { background: linear-gradient(135deg, #00adef, #005d82); }
        .popfm { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .pop-mix { background: linear-gradient(135deg, #662d91, #441e62); }
        .top-100 { background: linear-gradient(135deg, #fbb03b, #d97e00); }
        .soft-modern { background: linear-gradient(135deg, #7ec9ac, #4d8c75); }
        .soft-classic { background: linear-gradient(135deg, #5b7d87, #354a50); }

        /* Bund-afspiller */
        .footer-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1e1e1e;
            padding: 20px 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid #333;
            z-index: 999;
        }

        #current-label {
            font-size: 14px;
            margin-bottom: 10px;
            color: #f39c12;
            font-weight: bold;
            text-transform: uppercase;
        }

        audio {
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <h1>Radio Cast</h1>
    <p class="status-header">Vælg station for original kilde</p>

    <div class="grid">
        <button onclick="playOriginal(this, 'https://live-bauerdk.sharp-stream.com/nova-premium_96.aac', 'Nova')" class="btn nova">
            <span>Nova</span> <span>✨</span>
        </button>

        <button onclick="playOriginal(this, 'https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac', 'Radio 100')" class="btn radio100">
            <span>Radio 100</span> <span>💯</span>
        </button>

        <button onclick="playOriginal(this, 'https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac', 'The Voice')" class="btn the-voice">
            <span>The Voice</span> <span>💬</span>
        </button>

        <button onclick="playOriginal(this, 'https://live-bauerdk.sharp-stream.com/soft-premium_96.aac', 'Soft')" class="btn soft">
            <span>Soft</span> <span>☁️</span>
        </button>

        <button onclick="playOriginal(this, 'https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac', 'PopFM')" class="btn popfm">
            <span>PopFM</span> <span>🎤</span>
        </button>
    </div>

    <h2 style="font-size: 12px; color: #444; margin: 30px 0 10px 0; text-transform: uppercase;">Special Mixes</h2>
    <div class="grid">
        <button onclick="playOriginal(this, 'https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac', 'Pop Mix')" class="btn pop-mix">
            <span>Pop Mix</span> <span>🕺</span>
        </button>
        <button onclick="playOriginal(this, 'https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac', 'Top 100')" class="btn top-100">
            <span>Top 100</span> <span>🏆</span>
        </button>
        <button onclick="playOriginal(this, 'https://live-bauerdk.sharp-stream.com/RP09_premium_96.aac', 'Soft Modern')" class="btn soft-modern">
            <span>Soft Modern</span> <span>🌿</span>
        </button>
        <button onclick="playOriginal(this, 'https://live-bauerdk.sharp-stream.com/RP08_premium_96.aac', 'Soft Classic')" class="btn soft-classic">
            <span>Soft Classic</span> <span>🎻</span>
        </button>
    </div>

    <div class="footer-player">
        <div id="current-label">Vælg en station</div>
        <audio id="main-audio" controls preload="none" title="Radio Stream"></audio>
    </div>

    <script>
        const audioPlayer = document.getElementById('main-audio');
        const label = document.getElementById('current-label');

        function playOriginal(btn, url, name) {
            // 1. Stop nuværende afspilning helt
            audioPlayer.pause();
            
            // 2. Opdater navnet på siden
            label.textContent = "Sender nu: " + name;
            
            // 3. Her sker magien for Web Video Caster:
            // Vi sætter URL'en direkte på audio-elementet og opdaterer titlen
            audioPlayer.src = url;
            audioPlayer.title = name; // Dette læser WVC ofte som stream-navnet
            
            // 4. Tving browseren/WVC til at opfange den nye kilde
            audioPlayer.load();
            audioPlayer.play().catch(e => console.log("Afspilning kræver interaktion"));
            
            // 5. Opdater sidens titel (hjælper også nogle caster-apps)
            document.title = "Spiller: " + name;
        }
    </script>

</body>
</html>
