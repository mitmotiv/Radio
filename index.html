<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player Pro</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            padding-bottom: 150px;
        }
        
        h1 { margin-bottom: 5px; color: #f39c12; font-size: 28px; font-weight: 800; }
        .status-header { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            width: 100%; 
            max-width: 400px; 
        }
        
        /* Knapperne er links */
        .btn { 
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 25px; 
            border-radius: 16px; 
            text-decoration: none; 
            color: white; 
            font-weight: bold; 
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active { transform: scale(0.97); filter: brightness(1.2); }

        .nova { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .radio100 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .the-voice { background: #ffffff; color: #000; }
        .soft { background: linear-gradient(135deg, #00adef, #005d82); }
        .popfm { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .pop-mix { background: linear-gradient(135deg, #662d91, #441e62); }
        .top-100 { background: linear-gradient(135deg, #fbb03b, #d97e00); }
        .soft-modern { background: linear-gradient(135deg, #7ec9ac, #4d8c75); }
        .soft-classic { background: linear-gradient(135deg, #5b7d87, #354a50); }

        .footer-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1e1e1e;
            padding: 20px 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid #333;
            z-index: 9999;
        }

        #current-label {
            font-size: 14px;
            margin-bottom: 10px;
            color: #f39c12;
            font-weight: bold;
        }

        /* Vi bruger et video-tag (selvom det er lyd), da WVC ofte genkender det bedre */
        video {
            width: 90%;
            max-width: 400px;
            height: 50px;
            background: #000;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>Radio Cast</h1>
    <p class="status-header">Tryk for at vælge station</p>

    <div class="grid">
        <a href="https://live-bauerdk.sharp-stream.com/nova-premium_96.aac" onclick="return playStream(event, this.href, 'Nova')" class="btn nova">
            <span>Nova</span> <span>✨</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac" onclick="return playStream(event, this.href, 'Radio 100')" class="btn radio100">
            <span>Radio 100</span> <span>💯</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac" onclick="return playStream(event, this.href, 'The Voice')" class="btn the-voice">
            <span>The Voice</span> <span>💬</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/soft-premium_96.aac" onclick="return playStream(event, this.href, 'Soft')" class="btn soft">
            <span>Soft</span> <span>☁️</span>
        </a>

        <a href="https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac" onclick="return playStream(event, this.href, 'PopFM')" class="btn popfm">
            <span>PopFM</span> <span>🎤</span>
        </a>
    </div>

    <h2>Specials</h2>
    <div class="grid">
        <a href="https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac" onclick="return playStream(event, this.href, 'Pop Mix')" class="btn pop-mix">
            <span>Pop Mix</span> <span>🕺</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac" onclick="return playStream(event, this.href, 'Top 100')" class="btn top-100">
            <span>Top 100</span> <span>🏆</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP09_premium_96.aac" onclick="return playStream(event, this.href, 'Soft Modern')" class="btn soft-modern">
            <span>Soft Modern</span> <span>🌿</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP08_premium_96.aac" onclick="return playStream(event, this.href, 'Soft Classic')" class="btn soft-classic">
            <span>Soft Classic</span> <span>🎻</span>
        </a>
    </div>

    <div class="footer-player">
        <div id="current-label">Vælg en station</div>
        <video id="main-player" controls playsinline title="Radio Stream"></video>
    </div>

    <script>
        const player = document.getElementById('main-player');
        const label = document.getElementById('current-label');

        function playStream(e, url, name) {
            // 1. Stop normal link-navigation (ingen ny fane)
            e.preventDefault();

            // 2. Opdater UI
            label.textContent = "Klar: " + name;
            
            // 3. VIGTIGT FOR WVC: 
            // Vi sætter URL'en direkte og kalder load() med det samme.
            player.src = url;
            player.type = "audio/aac"; // Fortæller præcis hvad det er
            player.title = name;
            
            player.load();
            
            // 4. Start afspilning
            const playPromise = player.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    // Her kan WVC nu se den aktive originale stream
                    console.log("Afspiller " + name);
                }).catch(error => {
                    console.log("Afspilning fejlede: " + error);
                });
            }

            // Returner false for en sikkerheds skyld
            return false;
        }

        // Metadata til mobilen/Chromecast (Media Session API)
        player.addEventListener('play', () => {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: player.title,
                    artist: 'Radio Stream',
                    album: 'Live'
                });
            }
        });
    </script>

</body>
</html>
