<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Radio Danmark Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --accent: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px 250px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 550px;
        }

        .section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin: 25px 0 12px 5px;
            font-weight: 700;
            opacity: 0.8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
        }

        .btn {
            position: relative;
            background: rgba(var(--brand-color), 0.1);
            border: 1px solid rgba(var(--brand-color), 0.2);
            border-radius: 16px;
            padding: 12px 6px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            min-height: 75px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn .icon { font-size: 20px; margin-bottom: 4px; opacity: 0.8; }
        .btn span { font-size: 11px; font-weight: 500; text-align: center; width: 95%; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .btn.playing {
            background: rgba(var(--brand-color), 0.3);
            border-color: rgba(var(--brand-color), 0.6);
            color: #fff;
            box-shadow: 0 8px 20px rgba(var(--brand-color), 0.2);
        }

        /* BRAND FARVER */
        .nova { --brand-color: 46, 204, 113; }
        .r100 { --brand-color: 52, 152, 219; }
        .soft { --brand-color: 41, 128, 185; }
        .voice { --brand-color: 230, 230, 230; }
        .pop { --brand-color: 155, 89, 182; }
        .mix { --brand-color: 233, 30, 99; }
        .dr { --brand-color: 231, 76, 60; }
        .vinyl { --brand-color: 243, 156, 18; }
        .retro { --brand-color: 211, 84, 0; }
        .party { --brand-color: 241, 196, 15; }

        /* FOOTER PLAYER */
        .footer-player {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 420px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 16px 22px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .player-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .info-stack { display: flex; flex-direction: column; flex: 1; }
        #current-label { font-size: 9px; text-transform: uppercase; color: var(--text-dim); font-weight: 700; letter-spacing: 1px; }
        #current-name { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

        /* Visualizer */
        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 12px;
            width: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .visualizer.active { opacity: 1; }
        .v-bar { width: 3px; background: var(--text-main); border-radius: 1px; height: 100%; }
        .visualizer.active .v-bar { animation: bar-bounce 0.8s ease-in-out infinite alternate; }
        .v-bar:nth-child(2) { animation-delay: 0.2s !important; }
        .v-bar:nth-child(3) { animation-delay: 0.4s !important; }

        @keyframes bar-bounce {
            0% { height: 20%; }
            100% { height: 100%; }
        }

        .loading-pulse { animation: pulse 1.5s infinite; opacity: 0.5; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        .volume-ctrl {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 4px;
        }
        .volume-ctrl svg { fill: var(--text-dim); width: 14px; }
        input[type=range] {
            flex: 1;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .play-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #fff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-left: 15px;
        }
        .play-btn svg { fill: #000; width: 22px; height: 22px; }

        #audio-engine { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="section-title">Populære</div>
    <div class="grid">
        <div onclick="play('https://live-bauerdk.sharp-stream.com/nova-premium_96.aac', 'Nova', this)" class="btn nova"><span class="icon">✨</span><span>Nova</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac', 'Radio 100', this)" class="btn r100"><span class="icon">💯</span><span>Radio 100</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/soft-premium_96.aac', 'Radio Soft', this)" class="btn soft"><span class="icon">☁️</span><span>Radio Soft</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac', 'The Voice', this)" class="btn voice"><span class="icon">🎤</span><span>The Voice</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac', 'PopFM', this)" class="btn pop"><span class="icon">🎸</span><span>PopFM</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac', 'Mix 7', this)" class="btn mix"><span class="icon">🕺</span><span>Mix 7</span></div>
    </div>

    <div class="section-title">DR Stationer</div>
    <div class="grid">
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p5/playlist-320000.m3u8', 'P5', this)" class="btn dr"><span class="icon">☕</span><span>P5</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p4sjaelland/masterab.m3u8', 'P4', this)" class="btn dr"><span class="icon">📍</span><span>P4</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p3/playlist-320000.m3u8', 'P3', this)" class="btn dr"><span class="icon">⚡</span><span>P3</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p2/playlist-320000.m3u8', 'P2', this)" class="btn dr"><span class="icon">🎻</span><span>P2</span></div>
        <div onclick="play('https://drliveradio2.akamaized.net/hls/live/2118698/p1/playlist-320000.m3u8', 'P1', this)" class="btn dr"><span class="icon">📰</span><span>P1</span></div>
    </div>

    <div class="section-title">Retro</div>
    <div class="grid">
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP01_premium_96.aac', 'Radio Vinyl', this)" class="btn vinyl"><span class="icon">📻</span><span>Radio Vinyl</span></div>
        <div onclick="play('http://stream.vinylhits.dk/vinylmp3', 'VinylHits', this)" class="btn vinyl"><span class="icon">💿</span><span>VinylHits</span></div>
        <div onclick="play('https://streammp3.retro-radio.dk/retro-mp3', 'Retro', this)" class="btn retro"><span class="icon">🎙️</span><span>Retro</span></div>
    </div>

    <div class="section-title">Mix</div>
    <div class="grid">
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP27_premium_96.aac', 'Weekend Mix', this)" class="btn mix"><span class="icon">🍹</span><span>Weekend Mix</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP16_premium_96.aac', 'The Voice Mix', this)" class="btn voice"><span class="icon">🎧</span><span>Voice In Mix</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP17_premium_96.aac', 'Voice Throwback', this)" class="btn voice"><span class="icon">⏪</span><span>Voice Throw</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP11_premium_96.aac', 'Nova Dansk', this)" class="btn nova"><span class="icon">🇩🇰</span><span>100% Dansk</span></div>
        <div onclick="play('http://stream1.partyfm.dk/Party128', 'PartyFM', this)" class="btn party"><span class="icon">🥳</span><span>PartyFM</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac', 'Top 100', this)" class="btn r100"><span class="icon">📈</span><span>Top 100</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP09_premium_96.aac', 'Soft Modern', this)" class="btn soft"><span class="icon">✨</span><span>Soft Modern</span></div>
        <div onclick="play('https://live-bauerdk.sharp-stream.com/RP08_premium_96.aac', 'Soft Classic', this)" class="btn soft"><span class="icon">🎼</span><span>Soft Classic</span></div>
    </div>
</div>

<div class="footer-player">
    <div class="player-main">
        <div class="info-stack">
            <div id="current-label">Vælg station</div>
            <div id="current-name">
                Radio Danmark Pro
                <div id="v-engine" class="visualizer">
                    <div class="v-bar"></div>
                    <div class="v-bar"></div>
                    <div class="v-bar"></div>
                </div>
            </div>
        </div>
        <button class="play-btn" onclick="togglePlay()">
            <svg id="ctrl-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
    </div>
    
    <div class="volume-ctrl">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
    </div>
</div>

<video id="audio-engine" playsinline x-webkit-airplay="allow"></video>

<script>
    const engine = document.getElementById('audio-engine');
    const ctrlIcon = document.getElementById('ctrl-icon');
    const nameLabel = document.getElementById('current-name');
    const statusLabel = document.getElementById('current-label');
    const visualizer = document.getElementById('v-engine');

    function play(url, name, el) {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('playing'));
        el.classList.add('playing');
        
        nameLabel.innerHTML = name + `<div id="v-engine" class="visualizer active">${visualizer.innerHTML}</div>`;
        statusLabel.textContent = "Indlæser...";
        statusLabel.classList.add('loading-pulse');
        document.title = "⌛ " + name;
        
        engine.pause();
        engine.removeAttribute('src');
        engine.load();
        
        engine.src = url;
        engine.load();
        engine.play().catch(e => console.log("Interaction needed"));
        
        updateIcon(true);

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: name,
                artist: 'Radio Danmark Pro',
                artwork: [{ src: 'https://cdn-icons-png.flaticon.com/512/304/304164.png', sizes: '512x512', type: 'image/png' }]
            });
            navigator.mediaSession.setActionHandler('play', () => engine.play());
            navigator.mediaSession.setActionHandler('pause', () => engine.pause());
        }
    }

    function togglePlay() {
        if (engine.paused) { engine.play(); } 
        else { engine.pause(); }
    }

    function setVolume(val) { engine.volume = val; }

    function updateIcon(playing) {
        ctrlIcon.innerHTML = playing 
            ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' 
            : '<path d="M8 5v14l11-7z"/>';
        
        const currentViz = document.querySelector('.visualizer');
        if (currentViz) {
            playing ? currentViz.classList.add('active') : currentViz.classList.remove('active');
        }
    }

    engine.onwaiting = () => {
        statusLabel.textContent = "Buffer...";
        statusLabel.classList.add('loading-pulse');
    };

    engine.onplaying = () => {
        statusLabel.textContent = "Spiller nu";
        statusLabel.classList.remove('loading-pulse');
        document.title = "▶ " + nameLabel.textContent.trim();
        updateIcon(true);
    };

    engine.onpause = () => {
        statusLabel.textContent = "Sat på pause";
        statusLabel.classList.remove('loading-pulse');
        updateIcon(false);
    };

    engine.onerror = () => {
        statusLabel.textContent = "Stream utilgængelig";
        statusLabel.classList.remove('loading-pulse');
    };
</script>

</body>
</html>
