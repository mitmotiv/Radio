<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caspers Radio Dashboard</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
        }
        h1 { margin-bottom: 20px; color: #f39c12; font-size: 24px; }
        h2 { width: 100%; max-width: 400px; font-size: 16px; color: #888; margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            width: 100%; 
            max-width: 400px; 
        }
        
        .btn { 
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #f1c40f, #e67e22); 
            border: none; 
            padding: 18px 25px; 
            border-radius: 15px; 
            text-decoration: none; 
            color: #000; 
            font-weight: bold; 
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        
        .icon { font-size: 22px; }
    </style>
</head>
<body>

    <h1>Radio Dashboard</h1>

    <h2>Hovedstationer</h2>
    <div class="grid">
        <a href="https://live-bauerdk.sharp-stream.com/thevoice-premium_96.aac" class="btn">
            <span>The Voice</span> <span class="icon">👑</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/soft-premium_96.aac" class="btn">
            <span>Soft</span> <span class="icon">👑</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/nova-premium_96.aac" class="btn">
            <span>Nova</span> <span class="icon">👑</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/radio100-premium_96.aac" class="btn">
            <span>Radio 100</span> <span class="icon">👑</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/popfm-premium_96.aac" class="btn">
            <span>PopFM</span> <span class="icon">👑</span>
        </a>
    </div>

    <h2>Specials & Mix</h2>
    <div class="grid">
        <a href="https://live-bauerdk.sharp-stream.com/mix7-premium_96.aac" class="btn">
            <span>Pop Mix</span> <span class="icon">👑</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP25_premium_96.aac" class="btn">
            <span>Top 100</span> <span class="icon">👑</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP09_premium_96.aac" class="btn">
            <span>Soft Modern</span> <span class="icon">👑</span>
        </a>
        <a href="https://live-bauerdk.sharp-stream.com/RP08_premium_96.aac" class="btn">
            <span>Soft Classic</span> <span class="icon">👑</span>
        </a>
    </div>

    <p style="margin-top: 40px; color: #444; font-size: 12px;">Åbn denne side i Web Video Caster for at streame til Chromecast.</p>

</body>
</html>
